<!doctype html>
<!-- PROTOTYPE — throwaway. Answers wayfinder ticket 18: screen map + navigation + design language for the whole app.
     Main screen is locked (ticket 04, variant D: tiles → Sankey → trend). The variants here differ in NAVIGATION
     STRUCTURE, not screen content: A sidebar, B top tabs, C hub-and-spoke. Screens are shared across variants.
     Switch via ?variant=A|B|C or ←/→ keys. Screens via hash (#/transaktionen …). Dummy data. Delete after direction locked. -->
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mifi — UI-IA Prototyp</title>
<style>
  :root {
    color-scheme: light;
    --surface-1: #fcfcfb; --page: #f9f9f7;
    --ink-1: #0b0b0b; --ink-2: #52514e; --ink-3: #898781;
    --grid: #e1e0d9; --axis: #c3c2b7; --border: rgba(11,11,11,0.10);
    --good: #006300; --warn: #9a5b00; --bad: #b91c1c;
    --c-wohnen: #2a78d6; --c-lebensmittel: #eb6834; --c-mobilitaet: #1baf7a;
    --c-vertraege: #eda100; --c-freizeit: #e87ba4; --c-gesundheit: #4a3aa7;
    --c-sonstiges: #898781; --c-sparen: #008300; --c-puffer: #c3c2b7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --surface-1: #1a1a19; --page: #0d0d0d;
      --ink-1: #ffffff; --ink-2: #c3c2b7; --ink-3: #898781;
      --grid: #2c2c2a; --axis: #383835; --border: rgba(255,255,255,0.10);
      --good: #0ca30c; --warn: #f0a13c; --bad: #f47171;
      --c-wohnen: #3987e5; --c-lebensmittel: #d95926; --c-mobilitaet: #199e70;
      --c-vertraege: #c98500; --c-freizeit: #d55181; --c-gesundheit: #9085e9;
      --c-sonstiges: #898781; --c-sparen: #008300; --c-puffer: #383835;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--page); color: var(--ink-1);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  h1 { font-size: 18px; font-weight: 600; }
  h2 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .sub { color: var(--ink-3); font-size: 12px; }
  .card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .num { font-variant-numeric: tabular-nums; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--ink-2); margin-top: 10px; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .legend i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
  svg text { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: var(--ink-2); }
  svg .lbl-strong { fill: var(--ink-1); font-weight: 600; }
  svg .lbl-muted { fill: var(--ink-3); }
  svg .tick { fill: var(--ink-3); font-variant-numeric: tabular-nums; }
  details { margin-top: 12px; }
  summary { cursor: pointer; color: var(--ink-3); font-size: 12px; }
  table { border-collapse: collapse; font-size: 13px; width: 100%; }
  th, td { text-align: right; padding: 6px 10px; border-bottom: 1px solid var(--grid); }
  th:first-child, td:first-child, th.l, td.l { text-align: left; }
  th { color: var(--ink-3); font-weight: 500; font-size: 12px; }
  select, input[type=search] {
    background: var(--surface-1); color: var(--ink-1);
    border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 13px;
  }
  button.btn {
    all: unset; cursor: pointer; font-size: 13px; padding: 5px 12px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--surface-1);
  }
  button.btn:hover { background: rgba(128,128,128,.12); }
  button.btn.primary { background: var(--ink-1); color: var(--page); border-color: transparent; font-weight: 600; }
  button.btn.quiet { border-color: transparent; color: var(--ink-2); }
  header.page { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }

  #tooltip {

    padding: 6px 9px; border-radius: 6px; font-size: 12px; max-width: 260px;
  }

  #switcher {

    background: var(--ink-1); color: var(--page);

  #switcher .name { padding: 0 6px; min-width: 230px; text-align: center; }

  aside.side {
    border-right: 1px solid var(--border); background: var(--surface-1);

  main.content { padding: 24px 24px 110px; max-width: 1060px; width: 100%; }

  .topbar {
    position: sticky; top: 0; z-index: 40; background: var(--surface-1);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 4px; padding: 0 20px; height: 48px;

  .topbar .brand { font-weight: 700; margin-right: 14px; }
  a.tab {
    padding: 14px 11px; font-size: 13.5px; color: var(--ink-2); text-decoration: none;
    border-bottom: 2px solid transparent; display: inline-flex; gap: 6px; align-items: center;

  .topbar .spacer { flex: 1; }

  .layout-hub main.content { margin: 0 auto; max-width: 1020px; }
  .crumbbar { font-size: 13px; margin-bottom: 14px; }
  .crumbbar a { color: var(--ink-2); text-decoration: none; }
  .crumbbar a:hover { color: var(--ink-1); }
  .hublinks { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; margin-top: 26px; font-size: 13px; }
  .hublinks a { color: var(--ink-3); text-decoration: none; }
  .hublinks a:hover { color: var(--ink-1); }
  .hublinks a .badge { background: var(--bad); color: #fff; border-radius: 999px; font-size: 10.5px; padding: 1px 6px; font-weight: 600; margin-left: 4px; }

  /* transactions */
  tr.txrow:hover td { background: rgba(128,128,128,.06); }

  td .purpose { color: var(--ink-3); font-size: 12px; max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px; font-size: 12px;
    border: 1px solid var(--border); border-radius: 999px; padding: 2px 9px; cursor: pointer; background: transparent; color: var(--ink-2);

  .chip:hover { border-color: var(--axis); color: var(--ink-1); }
  .chip i { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }

  .tag { font-size: 11px; color: var(--ink-3); border: 1px solid var(--grid); border-radius: 4px; padding: 0 5px; }
  .amt.neg { color: var(--ink-1); } .amt.pos { color: var(--good); font-weight: 600; }
  tr.splitrow td { border-bottom: none; padding-top: 0; padding-bottom: 2px; color: var(--ink-2); font-size: 12.5px; }
  tr.splitrow.last td { border-bottom: 1px solid var(--grid); padding-bottom: 8px; }
  .datehead td { color: var(--ink-3); font-size: 12px; padding-top: 16px; border-bottom: 1px solid var(--grid); text-align: left; }

  /* categories master-detail (locked C-style) */
  .split { display: grid; grid-template-columns: 260px 1fr; gap: 16px; }
  .cat-list { display: flex; flex-direction: column; gap: 2px; }
  .cat-item {
    all: unset; cursor: pointer; display: grid;
    grid-template-columns: 12px 1fr auto; gap: 8px; align-items: center;
    padding: 8px 10px; border-radius: 8px; font-size: 13px;
  }
  .cat-item:hover { background: rgba(128,128,128,.12); }
  .cat-item.active { background: rgba(128,128,128,.18); font-weight: 600; }
  .cat-item i { width: 10px; height: 10px; border-radius: 3px; }
  .cat-item .amt { color: var(--ink-2); font-variant-numeric: tabular-nums; }
  .crumb { font-size: 12px; color: var(--ink-3); margin-bottom: 10px; }

  /* budget */
  .budgetrow { display: grid; grid-template-columns: 150px 1fr 200px; gap: 14px; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--grid); }
  .budgetrow:last-child { border-bottom: none; }
  .bname { font-weight: 500; display: flex; gap: 7px; align-items: center; font-size: 13.5px; }
  .bname i { width: 10px; height: 10px; border-radius: 3px; flex: none; }
  .bbar { height: 10px; border-radius: 5px; background: var(--grid); position: relative; overflow: hidden; }
  .bbar .fill { position: absolute; inset: 0 auto 0 0; border-radius: 5px; }
  .bbar .mark80 { position: absolute; top: -2px; bottom: -2px; width: 1px; background: var(--axis); left: 80%; }
  .bstate { font-size: 12px; color: var(--ink-3); text-align: right; }
  .bstate .warn { color: var(--warn); font-weight: 600; }
  .bstate .bad { color: var(--bad); font-weight: 600; }

  /* contracts */
  .contract { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--grid); font-size: 13.5px; }
  .contract:last-child { border-bottom: none; }
  .contract .meta { color: var(--ink-3); font-size: 12px; }
  .contract .norm { color: var(--ink-2); font-size: 12.5px; text-align: right; }

  /* accounts / sync */
  .acctgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .acct .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .acct .bal { font-size: 22px; font-weight: 600; margin: 4px 0 2px; }
  .acct .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .errbadge { color: var(--bad); font-size: 12px; font-weight: 600; }
  .okdot { color: var(--good); }
  .dropzone {
    border: 1.5px dashed var(--axis); border-radius: 10px; padding: 18px; text-align: center;
    color: var(--ink-3); font-size: 13px; margin-top: 16px;
  }
  .runline { font-size: 12.5px; color: var(--ink-2); display: flex; gap: 14px; flex-wrap: wrap; }

  /* TAN modal */
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 70; display: none; align-items: center; justify-content: center; }
  #overlay .dialog { background: var(--surface-1); border-radius: 12px; padding: 22px; width: 400px; max-width: 92vw; box-shadow: 0 12px 40px rgba(0,0,0,.35); }
  #overlay .challenge { background: var(--page); border: 1px solid var(--grid); border-radius: 8px; padding: 10px 12px; font-size: 13px; margin: 12px 0; }
  #overlay input[type=text] { width: 100%; font-size: 16px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px; background: var(--page); color: var(--ink-1); letter-spacing: 2px; }
  #overlay .modes { display: flex; gap: 6px; margin-bottom: 4px; }
  #overlay .modes button { all: unset; cursor: pointer; font-size: 12.5px; padding: 4px 10px; border-radius: 999px; color: var(--ink-2); border: 1px solid var(--border); }
  #overlay .modes button.on { background: var(--ink-1); color: var(--page); border-color: transparent; }
  #overlay .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--axis); border-top-color: var(--ink-1); border-radius: 50%; animation: sp 0.8s linear infinite; vertical-align: -2px; }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>

<script>

/* ================= dummy data (deterministic) ================= */

const S = 'http://www.w3.org/2000/svg';
function el(name, attrs = {}, parent) {
  const n = document.createElementNS(S, name);
  for (const [k,v] of Object.entries(attrs)) n.setAttribute(k, v);
  if (parent) parent.appendChild(n);
  return n;
}
function div(cls, html, parent, tag='div') {
  const d = document.createElement(tag);
  if (cls) d.className = cls;
  if (html !== undefined) d.innerHTML = html;
  if (parent) parent.appendChild(d);
  return d;
}
const tooltip = document.getElementById('tooltip');
function hover(node, html) {
  node.addEventListener('mousemove', e => {
    tooltip.style.display = 'block';
    tooltip.innerHTML = html();
    const x = Math.min(e.clientX + 14, innerWidth - tooltip.offsetWidth - 8);
    tooltip.style.left = x + 'px';
    tooltip.style.top  = (e.clientY + 14) + 'px';
  });
  node.addEventListener('mouseleave', () => tooltip.style.display = 'none');
}
function legend(items, parent) {
  const l = div('legend', '', parent);
  items.forEach(([name,color]) => {
    const s = document.createElement('span');
    s.innerHTML = `<i style="background:${color}"></i>${name}`;
    l.appendChild(s);
  });
}
const chip = (cat, extra='') => cat

function sankey(parent, m, { width = 900, height = 420, onCat = null } = {}) {
  const svg = el('svg', { viewBox:`0 0 ${width} ${height}`, width:'100%' }, parent);
  const NWD = 12, GAP = 10, PAD_T = 24, PAD_B = 8, labelW = 205;
  const colX = [labelW, width/2 - NWD/2, width - labelW - NWD];
  const mid = CATS.map(c => ({ name:c.name, color:c.color, value:c.monthly[m], cat:c }))
    .concat([{ name:'Sparen', color:'var(--c-sparen)', value:savingsAt() },
             { name:'Puffer (Giro)', color:'var(--c-puffer)', value:bufferAt(m) }]);
  const left  = INCOME.map(i => ({ name:i.name, color:'var(--axis)', value:i.monthly[m] }));
  const right = SAVINGS.map(([name,v]) => ({ name, color:'var(--c-sparen)', value:v }));
  const colSum = col => col.reduce((s,n)=>s+n.value,0);
  const avail = height - PAD_T - PAD_B;
  const pxPerEur = (avail - GAP * (mid.length - 1)) / Math.max(...[left,mid,right].map(colSum));
  function place(col, x) {
    const total = col.reduce((s,n)=>s + n.value*pxPerEur, 0) + GAP*(col.length-1);
    let y = PAD_T + (avail - total)/2;
    col.forEach(n => { n.x=x; n.y=y; n.h=Math.max(2,n.value*pxPerEur); n.out=n.y; n.in=n.y; y += n.h + GAP; });
  }
  place(left, colX[0]); place(mid, colX[1]); place(right, colX[2]);
  const linksG = el('g', {}, svg);
  function link(a, b, value, color) {
    const h = value * pxPerEur;
    const x0 = a.x + NWD, x1 = b.x, mx = (x0+x1)/2, sy = a.out, ty = b.in;
    a.out += h; b.in += h;
    const p = el('path', { d:`M${x0},${sy} C${mx},${sy} ${mx},${ty} ${x1},${ty} L${x1},${ty+h} C${mx},${ty+h} ${mx},${sy+h} ${x0},${sy+h} Z`, fill:color, 'fill-opacity':0.30 }, linksG);
    p.addEventListener('mouseenter', () => p.setAttribute('fill-opacity', 0.55));
    p.addEventListener('mouseleave', () => p.setAttribute('fill-opacity', 0.30));
    hover(p, () => `<b>${a.name} → ${b.name}</b>${eur(Math.round(value))} · ${MONTHS[m]}`);
  }
  const incTotal = colSum(left);
  mid.forEach(node => left.forEach(src => link(src, node, node.value * src.value/incTotal, node.color)));
  const sparenNode = mid.find(n => n.name === 'Sparen');
  right.forEach(t => link(sparenNode, t, t.value, 'var(--c-sparen)'));
  [left, mid, right].forEach((col, ci) => {
    col.forEach(n => {
      const r = el('rect', { x:n.x, y:n.y, width:NWD, height:n.h, rx:4, fill:n.color }, svg);
      if (onCat && n.cat) { r.style.cursor='pointer'; r.addEventListener('click', ()=>onCat(n.cat)); }
      const t = el('text', { y: n.y + Math.max(n.h/2, 6) + 4 }, svg);
      const anchorLeft = ci === 0;
      t.setAttribute('x', anchorLeft ? n.x - 8 : n.x + NWD + 8);
      t.setAttribute('text-anchor', anchorLeft ? 'end' : 'start');
      t.innerHTML = `<tspan class="lbl-strong">${n.name}</tspan><tspan class="lbl-muted" dx="6">${eur(n.value)}</tspan>`;
      if (onCat && n.cat) { t.style.cursor='pointer'; t.addEventListener('click', ()=>onCat(n.cat)); }
    });
  });
}
function roundedTop(x, y, w, h, r) {
  if (h <= 0) return 'M0,0';
  r = Math.min(r, h, w/2);
  return `M${x},${y+h} L${x},${y+r} Q${x},${y} ${x+r},${y} L${x+w-r},${y} Q${x+w},${y} ${x+w},${y+r} L${x+w},${y+h} Z`;
}
function trendChart(parent, { width = 900, height = 260, only = null, sel = -1, onSelect = null } = {}) {
  const svg = el('svg', { viewBox:`0 0 ${width} ${height}`, width:'100%' }, parent);
  const PAD_L = 52, PAD_R = 12, PAD_T = 14, PAD_B = 24;
  const w = width - PAD_L - PAD_R, h = height - PAD_T - PAD_B;
  const cats = only ? [only] : CATS;
  const maxV = only ? Math.max(...only.monthly) * 1.15 : Math.max(...MONTHS.map((_,m)=>incomeAt(m))) * 1.08;
  const y = v => PAD_T + h - v/maxV*h;
  const band = w / MONTHS.length, barW = Math.min(24, band * 0.55);
  const step = maxV > 3000 ? 1000 : maxV > 800 ? 250 : 100;
  for (let v = 0; v <= maxV; v += step) {
    el('line', { x1:PAD_L, x2:width-PAD_R, y1:y(v), y2:y(v), stroke: v===0?'var(--axis)':'var(--grid)', 'stroke-width':1 }, svg);
    el('text', { x:PAD_L-8, y:y(v)+4, 'text-anchor':'end', class:'tick' }, svg).textContent = v.toLocaleString('de-DE');
  }
  MONTHS.forEach((mon, m) => {
    const cx = PAD_L + band*m + band/2;
    let yTop = y(0);
    const g = el('g', {}, svg);
    if (onSelect) { g.style.cursor='pointer'; g.addEventListener('click', ()=>onSelect(m)); }
    if (sel >= 0 && m === sel)
      el('rect', { x:cx-band/2+2, y:PAD_T, width:band-4, height:h, fill:'var(--grid)', 'fill-opacity':0.5, rx:6 }, g);
    cats.forEach((c, ci) => {
      const v = c.monthly[m];
      const segH = Math.max(0, v/maxV*h - 2);
      const yy = yTop - v/maxV*h;
      const seg = el('path', { d: roundedTop(cx-barW/2, yy, barW, segH, ci===cats.length-1?4:0), fill:c.color }, g);
      hover(seg, () => `<b>${c.name} · ${mon}</b>${eur(v)} von ${eur(expensesAt(m))} Ausgaben`);
      yTop = yy;
    });
    el('text', { x:cx, y:height-8, 'text-anchor':'middle', class:'tick' }, svg).textContent = mon.split(' ')[0];
  });
  if (!only) {
    const pts = MONTHS.map((_,m)=>[PAD_L + band*m + band/2, y(incomeAt(m))]);
    el('path', { d:'M'+pts.map(p=>p.join(',')).join(' L'), fill:'none', stroke:'var(--ink-2)', 'stroke-width':2, 'stroke-linejoin':'round', 'stroke-linecap':'round' }, svg);
    const [ex,ey] = pts[pts.length-1];
    el('circle', { cx:ex, cy:ey, r:6, fill:'var(--surface-1)' }, svg);
    const dot = el('circle', { cx:ex, cy:ey, r:4, fill:'var(--ink-2)' }, svg);
    hover(dot, () => `<b>Einnahmen · ${MONTHS[CUR]}</b>${eur(incomeAt(CUR))}`);
    el('text', { x:ex-6, y:ey-10, 'text-anchor':'end', class:'lbl-strong' }, svg).textContent = 'Einnahmen ' + eur(incomeAt(CUR));
  }
}
function sparkline(parent, values, color, { width=110, height=30 } = {}) {
  const svg = el('svg', { viewBox:`0 0 ${width} ${height}`, width, height }, parent);
  const maxV = Math.max(...values), minV = Math.min(...values);
  const y = v => 4 + (height-8) * (1 - (v-minV)/((maxV-minV)||1));
  const x = i => 4 + (width-8) * i/(values.length-1);
  el('path', { d:'M'+values.map((v,i)=>`${x(i)},${y(v)}`).join(' L'), fill:'none', stroke:'var(--axis)', 'stroke-width':2, 'stroke-linejoin':'round' }, svg);
  el('circle', { cx:x(values.length-1), cy:y(values[values.length-1]), r:3.5, fill:color }, svg);
}
function areaChart(parent, series, { width=940, height=260 } = {}) {
  /* net worth: stacked cash + depot areas, total line + end label */
  const svg = el('svg', { viewBox:`0 0 ${width} ${height}`, width:'100%' }, parent);
  const PAD_L = 62, PAD_R = 12, PAD_T = 16, PAD_B = 24;
  const w = width - PAD_L - PAD_R, h = height - PAD_T - PAD_B;
  const maxV = Math.max(...NW.total) * 1.06;
  const y = v => PAD_T + h - v/maxV*h;
  const x = m => PAD_L + w * m/(MONTHS.length-1);
  const step = 20000;
  for (let v = 0; v <= maxV; v += step) {
    el('line', { x1:PAD_L, x2:width-PAD_R, y1:y(v), y2:y(v), stroke: v===0?'var(--axis)':'var(--grid)' }, svg);
    el('text', { x:PAD_L-8, y:y(v)+4, 'text-anchor':'end', class:'tick' }, svg).textContent = (v/1000)+'k';
  }
  const cashTop = MONTHS.map((_,m)=>NW.cash[m]);
  const totTop  = NW.total;
  function area(top, bottom, color, op) {
    const d = 'M' + MONTHS.map((_,m)=>`${x(m)},${y(top[m])}`).join(' L')
      + ' L' + MONTHS.map((_,m)=>`${x(MONTHS.length-1-m)},${y(bottom ? bottom[MONTHS.length-1-m] : 0)}`).join(' L') + ' Z';
    el('path', { d, fill: color, 'fill-opacity': op }, svg);
  }
  area(cashTop, null, 'var(--c-puffer)', 0.55);
  area(totTop, cashTop, 'var(--c-sparen)', 0.25);
  el('path', { d:'M'+MONTHS.map((_,m)=>`${x(m)},${y(totTop[m])}`).join(' L'), fill:'none', stroke:'var(--good)', 'stroke-width':2, 'stroke-linejoin':'round' }, svg);
  MONTHS.forEach((mon,m) => {
    if (m % 2 === 0) el('text', { x:x(m), y:height-6, 'text-anchor':'middle', class:'tick' }, svg).textContent = mon.split(' ')[0];
    const hit = el('rect', { x:x(m)-w/(MONTHS.length-1)/2, y:PAD_T, width:w/(MONTHS.length-1), height:h, fill:'transparent' }, svg);
    hover(hit, () => `<b>Nettovermögen · ${mon}</b>${eur(NW.total[m])} gesamt<br>Depot ${eur(NW.depot[m])} · Cash ${eur(NW.cash[m])}`);
  });
  const [ex,ey] = [x(CUR), y(totTop[CUR])];
  el('circle', { cx:ex, cy:ey, r:6, fill:'var(--surface-1)' }, svg);
  el('circle', { cx:ex, cy:ey, r:4, fill:'var(--good)' }, svg);
  el('text', { x:ex-8, y:ey-12, 'text-anchor':'end', class:'lbl-strong' }, svg).textContent = eur(NW.total[CUR]);
  legend([['Depot (Marktwert)','var(--c-sparen)'],['Cash (Konten)','var(--c-puffer)'],['Gesamt (Linie)','var(--good)']], parent);
}

const syncState = { running:false, done:{}, error:{} };
let rerender = () => {};
const overlay = document.getElementById('overlay');
function tanModal(onDone, onCancel) {
  overlay.style.display = 'flex';
  let mode = 'app';
  function paint() {
    overlay.innerHTML = `<div class="dialog">
      <h2>TAN erforderlich — Consorsbank</h2>
      <div class="sub">Der Sync für Giro + Tagesgeld wartet auf Freigabe. Andere Konten laufen weiter.</div>
      <div class="challenge">„Bitte bestätigen Sie den Kontozugriff für BLZ 760&nbsp;300&nbsp;80 in Ihrer SecurePlus App oder geben Sie die TAN ein.“</div>
      <div class="modes">
        <button id="m-app" class="${mode==='app'?'on':''}">SecurePlus App</button>
        <button id="m-code" class="${mode==='code'?'on':''}">TAN eingeben</button>
      </div>
      <div id="modebody"></div>
      <div class="actions">
        <button class="btn quiet" id="tan-cancel">Abbrechen</button>
        <button class="btn primary" id="tan-ok">${mode==='app' ? 'Fertig — weiter' : 'Bestätigen'}</button>
      </div>
    </div>`;
    const body = overlay.querySelector('#modebody');
    body.innerHTML = mode === 'app'
      ? `<div class="sub" style="padding:6px 0"><span class="spin"></span>&nbsp; Warte auf Bestätigung in der SecurePlus App …</div>`
      : `<input type="text" placeholder="TAN" inputmode="numeric" autocomplete="one-time-code">`;
    overlay.querySelector('#m-app').onclick = () => { mode='app'; paint(); };
    overlay.querySelector('#m-code').onclick = () => { mode='code'; paint(); };
    overlay.querySelector('#tan-ok').onclick = () => { overlay.style.display='none'; onDone(); };
    overlay.querySelector('#tan-cancel').onclick = () => { overlay.style.display='none'; onCancel(); };
  }
  paint();
}
function startSync(onlyAcct = null) {
  if (syncState.running) return;
  syncState.running = true; syncState.done = {}; syncState.error = {};
  rerender();
  const scalable = ['depot','verr'].filter(id => !onlyAcct || onlyAcct === id);
  const fints    = ['giro','tages'].filter(id => !onlyAcct || onlyAcct === id);
  setTimeout(() => { scalable.forEach(id => syncState.done[id] = true); rerender(); }, 900);
  if (fints.length) {
    setTimeout(() => tanModal(
      () => { fints.forEach(id => { syncState.done[id]=true; acctById(id).synced='gerade eben'; }); finish(); },
      () => { fints.forEach(id => syncState.error[id] = 'HKKAZ: Auftrag abgebrochen — TAN-Freigabe nicht erteilt (9800)'); finish(); }
    ), 700);
  } else setTimeout(finish, 1000);
  function finish() {
    syncState.running = false;
    ['depot','verr'].forEach(id => { if (syncState.done[id]) acctById(id).synced='gerade eben'; });
    rerender();
  }
}
function syncControls(parent, { compact=false } = {}) {
  const wrap = div('', '', parent);
  const btn = div('', '', wrap, 'button');
  btn.className = 'btn' + (compact ? '' : ' primary');
  btn.textContent = syncState.running ? 'Synchronisiere …' : 'Synchronisieren';
  btn.disabled = syncState.running;
  btn.onclick = () => startSync();
  if (!compact) {
    const line = div('sub', '', wrap);
    line.style.marginTop = '6px';
    const errs = Object.keys(syncState.error).length;
    line.textContent = syncState.running ? 'Läuft — Konten einzeln, TAN kann erscheinen'
      : errs ? `${errs} Konto/Konten fehlgeschlagen — Details unter Konten`
      : 'Zuletzt: Konten einzeln, siehe Zeitstempel';
  }
  return wrap;
}

        if (t.splits) t.splits.forEach(([cid, name, v, prov], si) => {
          const sc = catById(cid);
          html += `<tr class="splitrow ${si===t.splits.length-1?'last':''}"><td class="l" style="padding-left:26px">↳ ${name}</td><td></td>
            <td class="l">${chip(sc)} <span class="tag" title="${prov==='auto'?'automatisch zugeordnet':'manuell zugeordnet'}">${prov==='auto'?'auto':'manuell'}</span></td>
            <td class="num amt neg">−${eur2(Math.abs(v))}</td></tr>`;
        });
      });
      table.innerHTML = html;
      table.querySelectorAll('.chip[data-cat]').forEach(c => c.onclick = e => {
        txCatEdit = +e.target.closest('tr').dataset.i; paintTable();
      });
      table.querySelectorAll('select[data-edit]').forEach(s => {
        s.onchange = () => { TX[+s.dataset.edit].cat = s.value; txCatEdit = null; paintTable(); };
        s.onblur = () => { txCatEdit = null; paintTable(); };
      });
    }
    paintTable();
    div('sub', 'Kategorie-Chip anklicken zum Umkategorisieren · Split-Zeilen zeigen Herkunft (auto/manuell)', root).style.marginTop = '10px';
  }
  paint();
}

function renderKategorien(root, _nav, selId) {
  let selCat = catById(selId) || CATS[0];
  function paint() {
    root.innerHTML = `<header class="page"><div><h1>Kategorien</h1>
      <div class="sub">Master–Detail · Stand ${MONTHS[CUR]}</div></div></header>`;
    const split = div('split', '', root);
    const listCard = div('card', '', split);
    const list = div('cat-list', '', listCard);
    [...CATS].sort((a,b)=>b.monthly[CUR]-a.monthly[CUR]).forEach(c => {
      const b = document.createElement('button');
      b.className = 'cat-item' + (c.id===selCat.id ? ' active' : '');
      b.innerHTML = `<i style="background:${c.color}"></i><span>${c.name}</span><span class="amt">${eur(c.monthly[CUR])}</span>`;
      b.addEventListener('click', ()=>{ selCat=c; paint(); });
      list.appendChild(b);
    });
    div('sub', `Ausgaben gesamt: <b>${eur(expensesAt(CUR))}</b> · Sparen: <b>${eur(savingsAt())}</b>`, listCard).style.marginTop='12px';

    const detail = div('card', '', split);
    div('crumb', `Alle Kategorien › <b>${selCat.name}</b>`, detail);
    detail.insertAdjacentHTML('beforeend',
      `<h2>${selCat.name}</h2>
       <div class="sub">${eur(selCat.monthly[CUR])} in ${MONTHS[CUR]} · Ø ${eur(Math.round(selCat.monthly.reduce((a,b)=>a+b)/12))} pro Monat</div>`);
    trendChart(detail, { width: 760, height: 210, only: selCat });
    const row = div('row', '', detail); row.style.marginTop='14px';
    const subCard = div('', `<h2>Unterkategorien · ${MONTHS[CUR]}</h2>`, row);
    subCard.style.flex='1 1 300px';
    const total = selCat.monthly[CUR];
    const subSvg = el('svg', { viewBox:'0 0 380 '+(selCat.subs.length*30+4), width:'100%' }, subCard);
    selCat.subs.forEach(([name,share],i) => {
      const v = Math.round(total*share), yy = i*30+4;
      const bw2 = Math.max(3, 180 * share/Math.max(...selCat.subs.map(s=>s[1])));
      el('text', { x:115, y:yy+14, 'text-anchor':'end', class:'lbl-strong' }, subSvg).textContent = name;
      const bar = el('rect', { x:125, y:yy, width:bw2, height:20, rx:4, fill:selCat.color }, subSvg);
      hover(bar, () => `<b>${name}</b>${eur(v)} · ${pct(share)}`);
      el('text', { x:125+bw2+8, y:yy+14, class:'tick' }, subSvg).textContent = eur(v);
    });
    const conCard = div('', `<h2>Verträge in dieser Kategorie</h2>`, row);
    conCard.style.flex='1 1 260px';
    const cs = CONTRACTS_ACTIVE.filter(c => c.cat === selCat.id);
    if (cs.length) cs.forEach(c => div('contract', `<span>${c.name}</span><span class="meta">${c.amount} · ${c.interval}</span><span class="norm">${c.norm}</span>`, conCard));
    else div('sub', 'Keine wiederkehrenden Zahlungen erkannt.', conCard);
  }
  paint();
}

function renderBudget(root) {
  root.innerHTML = `<header class="page"><div><h1>Budget · ${MONTHS[CUR]}</h1>
    <div class="sub">Monatsziele je Kategorie · Kalendermonat, kein Übertrag</div></div>
    <button class="btn">Ziele bearbeiten</button></header>`;
  const card = div('card', '', root);
  const totalTarget = BUDGETS.reduce((s,[,t])=>s+t,0);
  const totalSpent  = BUDGETS.reduce((s,[id])=>s+spentOf(id),0);
  div('sub', `${eur(totalSpent)} von ${eur(totalTarget)} budgetiert ausgegeben — Tag 21 von 31`, card).style.marginBottom='8px';
  BUDGETS.forEach(([id, target]) => {
    const c = catById(id), spent = spentOf(id);
    const ratio = spent / target;
    const row = div('budgetrow', '', card);
    div('bname', `<i style="background:${c.color}"></i>${c.name}`, row);
    const bar = div('bbar', `<div class="fill" style="width:${Math.min(100, ratio*100)}%; background:${c.color}; opacity:${ratio>=1?1:.85}"></div><div class="mark80"></div>`, row);
    hover(bar, () => `<b>${c.name}</b>${eur(spent)} von ${eur(target)} · ${pct(ratio)}`);
    const state = ratio >= 1
      ? `<span class="bad">⚠ überzogen +${eur(spent-target)}</span>`
      : ratio >= 0.8
      ? `<span class="warn">▲ ${pct(ratio)} erreicht</span>`
      : `${pct(ratio)}`;
    div('bstate num', `${eur(spent)} / ${eur(target)}<br>${state}`, row);
  });
  const unbudgeted = CATS.filter(c => !BUDGETS.some(([id])=>id===c.id));
  const uSpent = unbudgeted.reduce((s,c)=>s+c.monthly[CUR],0);
  const row = div('budgetrow', '', card);
  div('bname sub', `Ohne Budget (${unbudgeted.map(c=>c.name).join(', ')})`, row);
  div('', '', row);
  div('bstate num', `${eur(uSpent)}`, row);
  div('sub', 'Schwellen: ▲ ab 80 %, ⚠ ab 100 % — keine Tempo-Anpassung, Ziele wirken ab Folgemonat', root).style.marginTop='10px';
}

function renderVertraege(root) {
  function paint() {
    root.innerHTML = `<header class="page"><div><h1>Verträge</h1>
      <div class="sub">Wiederkehrende Zahlungen — erkannt aus Umsätzen, monatlich normalisiert</div></div></header>`;
    const fixSum = CONTRACTS_ACTIVE.filter(c=>!c.income)
      .reduce((s,c)=>s+parseFloat(c.norm.replace('.','').replace(',','.')),0);
    const tiles = div('tiles', '', root);
    [['Fixkosten', eur(Math.round(fixSum))+'/Monat', 'var(--c-vertraege)'],
     ['Vertrags-Einnahmen', '4.200 €/Monat', 'var(--c-sparen)'],
     ['Aktive Verträge', String(CONTRACTS_ACTIVE.length), 'var(--c-wohnen)']]
      .forEach(([l,v]) => div('card tile', `<div class="lbl">${l}</div><div class="val">${v}</div>`, tiles));

    if (CONTRACTS_NEW.length) {
      const newCard = div('card', `<h2>Neu erkannt</h2><div class="sub">Bestätigen übernimmt den Vertrag, Ablehnen verwirft den Vorschlag</div>`, root);
      newCard.style.marginTop='16px';
      CONTRACTS_NEW.forEach((c, i) => {
        const row = div('contract', '', newCard);
        row.innerHTML = `<span><b>${c.name}</b><div class="meta">${c.hint} · ${chip(catById(c.cat))}</div></span>
          <span class="norm">${c.amount} · ${c.interval}<br>${c.norm}</span><span></span>`;
        const btns = row.lastElementChild;
        const ok = div('', 'Bestätigen', btns, 'button'); ok.className='btn primary';
        const no = div('', 'Ablehnen', btns, 'button'); no.className='btn quiet'; no.style.marginLeft='6px';
        ok.onclick = () => { CONTRACTS_ACTIVE.push(CONTRACTS_NEW.splice(i,1)[0]); paint(); };
        no.onclick = () => { CONTRACTS_NEW.splice(i,1); paint(); };
      });
    }

    const actCard = div('card', `<h2>Aktiv</h2>`, root);
    actCard.style.marginTop='16px';
    CONTRACTS_ACTIVE.forEach(c => {
      div('contract', `<span><b>${c.name}</b><div class="meta">${c.income ? 'Einnahme' : ''} ${c.cat ? chip(catById(c.cat)) : ''} · nächste Zahlung ${c.next || '—'}</div></span>
        <span class="norm">${c.amount} · ${c.interval}</span>
        <span class="norm">${c.norm}</span>`, actCard);
    });
    div('sub', 'Interne Umbuchungen (z. B. Dauerauftrag Sparen) erscheinen hier nie — Verträge sind nur echte Einnahmen/Ausgaben', root).style.marginTop='10px';
  }
  paint();
}

function renderVermoegen(root) {
  root.innerHTML = `<header class="page"><div><h1>Vermögen</h1>
    <div class="sub">Aus Snapshots berechnet — Kontostände + Depotpositionen je Sync</div></div></header>`;
  const depotVal = POSITIONS.reduce((s,p)=>s+p.qty*p.price,0);
  const cashVal = ACCOUNTS.filter(a=>a.id!=='depot').reduce((s,a)=>s+a.balance,0);
  const delta = NW.total[CUR]-NW.total[CUR-1];
  const tiles = div('tiles', '', root);
  [['Nettovermögen', eur(NW.total[CUR]), NW.total, 'var(--good)'],
   ['Depot', eur(Math.round(depotVal)), NW.depot, 'var(--c-sparen)'],
   ['Cash', eur(Math.round(cashVal)), NW.cash, 'var(--c-puffer)'],
   ['Δ Monat', (delta>=0?'+':'')+eur(delta), null, null]]
    .forEach(([l,v,trend,color]) => {
      const t = div('card tile', `<div class="lbl">${l}</div><div class="val">${v}</div>`, tiles);
      if (trend) sparkline(t, trend, color);
    });

  const chart = div('card', `<h2>Verlauf</h2><div class="sub">12 Monate · Depot zum Marktwert, Cash über alle Konten</div>`, root);
  chart.style.marginTop='16px';
  areaChart(chart, null, { width: 980, height: 250 });

  const posCard = div('card', `<h2>Depotpositionen</h2><div class="sub">Scalable Depot · Stand letzter Sync (gestern)</div>`, root);
  posCard.style.marginTop='16px';
  const t = document.createElement('table');
  t.innerHTML = '<tr><th class="l">Position</th><th>Stück</th><th>Kurs</th><th>Wert</th><th>Heute</th><th>Anteil</th></tr>'
    + POSITIONS.map(p => {
      const val = p.qty*p.price, d = (p.price-p.prev)/p.prev;
      return `<tr><td class="l"><b>${p.name}</b><div class="sub">${p.isin}</div></td>
        <td class="num">${p.qty}</td><td class="num">${eur2(p.price)}</td><td class="num">${eur(Math.round(val))}</td>
        <td class="num" style="color:${d>=0?'var(--good)':'var(--bad)'}">${d>=0?'+':''}${(d*100).toFixed(1).replace('.',',')} %</td>
        <td class="num">${pct(val/depotVal)}</td></tr>`;
    }).join('')
    + `<tr><td class="l"><b>Gesamt</b></td><td></td><td></td><td class="num"><b>${eur(Math.round(depotVal))}</b></td><td></td><td></td></tr>`;
  posCard.appendChild(t);

  const acctCard = div('card', `<h2>Konten</h2>`, root);
  acctCard.style.marginTop='16px';
  const t2 = document.createElement('table');
  t2.innerHTML = ACCOUNTS.map(a => `<tr><td class="l">${a.name}<span class="sub"> · ${a.type}</span></td>
    <td class="num">${eur2(a.balance)}</td></tr>`).join('');
  acctCard.appendChild(t2);
}

function renderKonten(root) {
  root.innerHTML = `<header class="page"><div><h1>Konten & Sync</h1>
    <div class="sub">Manueller Sync — global oder je Konto · Commit atomar pro Konto</div></div></header>`;
  const bar = div('card', '', root);
  const barRow = div('row', '', bar); barRow.style.alignItems='center';
  syncControls(barRow);
  if (syncState.running || Object.keys(syncState.done).length || Object.keys(syncState.error).length) {
    const rl = div('runline', '', bar); rl.style.marginTop='10px';
    ACCOUNTS.filter(a=>a.src!=='CSV-Import').forEach(a => {
      const st = syncState.error[a.id] ? '✕' : syncState.done[a.id] ? '✓' : syncState.running ? '…' : '·';
      const cls = syncState.error[a.id] ? 'errbadge' : syncState.done[a.id] ? 'okdot' : '';
      div('', `<span class="${cls}">${st}</span> ${a.name}`, rl, 'span');
    });
  }

  const grid = div('acctgrid', '', root); grid.style.marginTop='16px';
  ACCOUNTS.forEach(a => {
    const c = div('card acct', '', grid);
    div('top', `<b>${a.name}</b><span class="sub">${a.src}</span>`, c);
    div('bal num', eur2(a.balance), c);
    div('sub', a.type, c);
    const foot = div('foot', '', c);
    const err = syncState.error[a.id];
    if (err) {
      const e = div('errbadge', '✕ Sync fehlgeschlagen', foot);
      hover(e, () => `<b>Fehlermeldung (Original)</b>${err}`);
    } else {
      div('sub' + (a.stale ? ' errbadge' : ''), (a.stale?'⚠ ':'') + (a.src==='CSV-Import' ? a.synced : `Synchronisiert ${a.synced}`), foot);
    }
    if (a.src === 'CSV-Import') {
      const b = div('', 'CSV importieren …', foot, 'button'); b.className='btn';
    } else {
      const b = div('', err ? 'Erneut versuchen' : 'Sync', foot, 'button'); b.className='btn';
      b.onclick = () => startSync(a.id);
    }
  });

  div('dropzone', 'CSV hierher ziehen — PayPal-Aktivitäten oder Scalable-Export werden automatisch erkannt.<br><span class="sub">Import ist idempotent: erneutes Einlesen derselben Datei erzeugt keine Duplikate.</span>', root);
}

const RENDERERS = {
  uebersicht: renderUebersicht, transaktionen: renderTransaktionen, kategorien: renderKategorien,
  budget: renderBudget, vertraege: renderVertraege, vermoegen: renderVermoegen, konten: renderKonten,
};

/* ================= shells / variants ================= */
const shellRoot = document.getElementById('shell');
function currentScreen() {
  const h = (location.hash || '#/uebersicht').replace(/^#\//,'').split('/');
  return { id: SCREENS.some(s=>s.id===h[0]) ? h[0] : 'uebersicht', arg: h[1] };
}
function nav(id, arg) { location.hash = '#/' + id + (arg ? '/'+arg : ''); }

function shellSidebar() {
  const { id, arg } = currentScreen();
  shellRoot.innerHTML = '';
  const layout = div('layout-sidebar', '', shellRoot);
  const side = div('side', '', layout, 'aside');
  div('brand', 'mifi', side);
  SCREENS.forEach(s => {
    const a = div('navitem' + (s.id===id?' active':''), '', side, 'a');
    a.href = '#/'+s.id;
    const b = s.badge && s.badge();
    a.innerHTML = `<span>${s.short || s.title}</span>` + (b ? `<span class="badge">${b}</span>` : '');
  });
  const sync = div('syncblock', '', side);
  div('sub', 'Zuletzt: vor 2 Std.', sync).style.marginBottom='6px';
  syncControls(sync, { compact:true });
  const main = div('content', '', layout, 'main');
  RENDERERS[id](main, nav, arg);
}

function shellTopbar() {
  const { id, arg } = currentScreen();
  shellRoot.innerHTML = '';
  const layout = div('layout-top', '', shellRoot);
  const bar = div('topbar', '', layout);
  div('brand', 'mifi', bar);
  SCREENS.forEach(s => {
    const a = div('tab' + (s.id===id?' active':''), '', bar, 'a');
    a.href = '#/'+s.id;
    const b = s.badge && s.badge();
    a.innerHTML = (s.short || s.title) + (b ? ` <span class="badge">${b}</span>` : '');
  });
  div('spacer', '', bar);
  syncControls(bar, { compact:true });
  const main = div('content', '', layout, 'main');
  RENDERERS[id](main, nav, arg);
}

function shellHub() {
  const { id, arg } = currentScreen();
  shellRoot.innerHTML = '';
  const layout = div('layout-hub', '', shellRoot);
  const main = div('content', '', layout, 'main');
  if (id !== 'uebersicht') {
    const crumb = div('crumbbar', '', main);
    crumb.innerHTML = `<a href="#/uebersicht">‹ Übersicht</a> <span class="sub">/ ${SCREENS.find(s=>s.id===id).title}</span>`;
  }
  RENDERERS[id](main, nav, arg);
  const links = div('hublinks', '', main);
  SCREENS.filter(s => s.id !== id).forEach(s => {
    const a = div('', '', links, 'a'); a.href = '#/'+s.id;
    const b = s.badge && s.badge();
    a.innerHTML = s.title + (b ? `<span class="badge">${b}</span>` : '');
  });
}

/* ================= variant switcher ================= */
const VARIANTS = [
  ['A', 'Seitenleiste (Desktop-App)', shellSidebar],
  ['B', 'Kopfleiste mit Tabs', shellTopbar],
  ['C', 'Hub & Spoke (Übersicht als Zentrale)', shellHub],
];
let idx = Math.max(0, VARIANTS.findIndex(([k]) => k === (new URLSearchParams(location.search).get('variant') || 'A').toUpperCase()));
function show(i) {
  idx = (i + VARIANTS.length) % VARIANTS.length;
  const [key, name, fn] = VARIANTS[idx];
  try { history.replaceState(null, '', '?variant=' + key + location.hash); } catch (e) { /* file:// blocks this */ }
  document.getElementById('vname').textContent = `${key} — ${name}`;
  tooltip.style.display = 'none';
  rerender = fn;
  fn();
}
document.getElementById('prev').addEventListener('click', () => show(idx - 1));
document.getElementById('next').addEventListener('click', () => show(idx + 1));
document.addEventListener('keydown', e => {
  const t = e.target;
  if (t.matches('input, textarea, select, [contenteditable]')) return;
  if (e.key === 'ArrowLeft') show(idx - 1);
  if (e.key === 'ArrowRight') show(idx + 1);
});
window.addEventListener('hashchange', () => { tooltip.style.display='none'; VARIANTS[idx][2](); });
show(idx);
</script>
